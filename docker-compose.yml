services:
  # POSTGIS
  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: Dockerfile.postgis
    restart: unless-stopped
    ports:
      - "${PG_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb/postgis.sql:/docker-entrypoint-initdb.d/postgis.sql
  
  # PGADMIN
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      postgres: 
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json

  # GEOSERVER
  geoserver:
    container_name: geoserver
    image: kartoza/geoserver:${GEOSERVER_VERSION}
    restart: on-failure
    ports:
      - "${GEOSERVER_PORT}:8080"
    environment:
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
        test: [ "CMD-SHELL", "curl --fail --silent --write-out 'HTTP CODE : %{http_code}\n' --output /dev/null -u $${GEOSERVER_ADMIN_USER}:$${GEOSERVER_ADMIN_PASSWORD} http://localhost:8080/geoserver/rest/about/version.xml" ]
        interval: 1m30s
        timeout: 10s
        retries: 3
        start_period: 1m
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./initdb/geoserver.xml:/opt/geoserver/data_dir/security/geoserver.xml

volumes:
  postgres_data: {}
  pgadmin_data: {}
  geoserver_data: