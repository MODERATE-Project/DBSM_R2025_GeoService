version: '3'

dotenv: ['.env']


tasks:
  up:
    desc: "Start all services"
    cmds:
      - docker compose up --build -d
    silent: true
  down:
    desc: "Stop all services"
    cmds:
      - docker compose down
    silent: true
  stop:
    desc: "Stop all services"
    cmds:
      - docker compose stop
    silent: true
  start:
    desc: "Start all services"
    cmds:
      - docker compose start
    silent: true
  restart:
    desc: "Restart all services"
    cmds:
      - docker compose restart
    silent: true
  logs:
    desc: "Show logs for all services"
    cmds:
      - docker compose logs -f
    silent: true
  ps:
    desc: "Show status of all services"
    cmds:
      - docker compose ps
    silent: true
  import:
    desc: "📦 Import GPKG data into PostGIS | 🧰 Usage: task import -- CITY=malta -- VERSION=v2| 🌍 CITY options: austria, belgium, bulgaria, croatia, cyprus, czechia, denmark, estonia, finland, france, germany, greece, hungary, ireland, italy, latvia, lithuania, luxembourg, malta, netherlands, poland, portugal, romania, slovakia, slovenia, spain, sweden | Version options: v1, v2"

    cmds:
      - ./import_data.sh {{.CITY}} {{.VERSION}}
    vars:
      CITY: '{{.CITY | default "malta"}}'
      VERSION: '{{.VERSION | default "v2"}}'

  api:reload:
    desc: "🔄 Reload PostgREST schema cache (makes new SQL views/functions visible in API)"
    cmds:
      - echo ">> Signalling PostgREST to reload schema cache..."
      - docker kill -s SIGUSR1 dbsm_postgrest
      - echo ">> API Schema reloaded!"
    silent: false

  db:apply-sql:
    desc: "📝 Apply SQL init files directly and reload API schema"
    cmds:
      - echo ">> Applying postgis.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/postgis.sql
      - echo ">> Applying postgrest.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/postgrest.sql
      - echo ">> Applying api_functions.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/api_functions.sql
      - echo ">> All SQL files applied successfully."
      - task: api:reload # <-- CRUCIAL: Recarga la API automáticamente
    silent: false

  db:apply-sql-safe:
    desc: "🛡️ Apply SQL only if database already has tables"
    cmds:
      - |
        TABLE_COUNT=$(docker exec {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} -tAc \
          "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema IN ('v1','v2');")
        if [ "$TABLE_COUNT" -eq "0" ]; then
          echo "No tables found. The volume appears empty. Run 'task up' to let Docker auto-init."
          exit 0
        fi
        echo "Existing tables detected. Applying SQL files manually..."
        task db:apply-sql
    silent: false

  clean:soft:
    desc: "🧹 Stop services and remove containers (keeps data volumes)"
    cmds:
      - docker compose down --remove-orphans
    silent: false

  clean:nuke:
    desc: "⚠️ DESTRUCTIVE — Full environment reset. Removes ALL volumes and data."
    prompt: "This will destroy your database and geoserver data. Are you sure?"
    cmds:
      - echo ">> Destroying all services and volumes..."
      - docker compose down -v --remove-orphans
      - rm -rf ./postgres_data || true 
      - echo ">> Environment is completely clean. Run 'task up' to start fresh."
    silent: false

  db:reset:
    desc: "♻️ Rebuild database from scratch (Alias for clean:nuke + up)"
    cmds:
      - task: clean:nuke
      - task: up
      - echo ">> Stack restarted. Re-import your data with 'task import'"
    silent: false