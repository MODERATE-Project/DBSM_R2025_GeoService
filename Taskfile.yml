version: '3'

dotenv: ['.env']


tasks:
  up:
    desc: "Start all services"
    cmds:
      - docker compose up --build -d
    silent: true
  down:
    desc: "Stop all services"
    cmds:
      - docker compose down
    silent: true
  stop:
    desc: "Stop all services"
    cmds:
      - docker compose stop
    silent: true
  start:
    desc: "Start all services"
    cmds:
      - docker compose start
    silent: true
  restart:
    desc: "Restart all services"
    cmds:
      - docker compose restart
    silent: true
  logs:
    desc: "Show logs for all services"
    cmds:
      - docker compose logs -f
    silent: true
  ps:
    desc: "Show status of all services"
    cmds:
      - docker compose ps
    silent: true
  import:
    desc: "📦 Import GPKG data into PostGIS | 🧰 Usage: task import -- CITY=malta -- VERSION=v1| 🌍 CITY options: austria, belgium, bulgaria, croatia, cyprus, czechia, denmark, estonia, finland, france, germany, greece, hungary, ireland, italy, latvia, lithuania, luxembourg, malta, netherlands, poland, portugal, romania, slovakia, slovenia, spain, sweden | Version options: v1, v2"

    cmds:
      - ./import_data.sh {{.CITY}} {{.VERSION}}
    vars:
      CITY: '{{.CITY | default "malta"}}'
      VERSION: '{{.VERSION | default "v1"}}'


  # ---------------------------------------------------------------------------
  # Database SQL management
  # Use these tasks when the postgres_data volume already exists and Docker's
  # initdb scripts (initdb/*.sql) have NOT been re-executed automatically.
  # Docker only runs initdb scripts on the very first volume creation.
  # ---------------------------------------------------------------------------

  db:apply-sql:
    desc: |
      Apply all SQL init files (postgis.sql, postgrest.sql, api_functions.sql)
      directly to the running Postgres container.
      Use this after adding or modifying any file in initdb/ when the database
      volume already exists (i.e. ./postgres_data is not empty).
      The container must be running: run 'task up' first.
    cmds:
      - echo ">> Applying postgis.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/postgis.sql
      - echo ">> Applying postgrest.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/postgrest.sql
      - echo ">> Applying api_functions.sql..."
      - docker exec -i {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} < initdb/api_functions.sql
      - echo ">> All SQL files applied successfully."
    silent: false

  db:apply-sql-safe:
    desc: |
      Same as db:apply-sql but checks first whether the database volume already
      contains data. Exits with a warning if the initdb scripts have not yet
      been run (empty volume), so you can simply restart the stack instead.
      Use this when unsure whether to apply SQL manually or just restart.
    cmds:
      - |
        TABLE_COUNT=$(docker exec {{.PG_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}} -tAc \
          "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema IN ('v1','v2');")
        if [ "$TABLE_COUNT" -eq "0" ]; then
          echo "No tables found in v1/v2 schemas. The volume appears empty."
          echo "Tip: just run 'task up' — Docker will execute initdb scripts automatically."
          exit 0
        fi
        echo "Existing tables detected ($TABLE_COUNT). Applying SQL files manually..."
        task db:apply-sql
    silent: false

  db:reset:
    desc: |
      ⚠️  DESTRUCTIVE — Full database reset.
      Stops all services, removes the postgres_data volume, and restarts the
      stack so that all initdb SQL scripts are re-executed from scratch.
      Use this only when you need a clean slate (e.g. major schema changes).
      All imported data will be lost and must be re-imported with 'task import'.
    cmds:
      - echo ">> Stopping services..."
      - docker compose down
      - echo ">> Removing postgres_data volume..."
      - docker volume rm dbsm-geoservice_postgres_data || true
      - rm -rf ./postgres_data || true
      - echo ">> Restarting stack (initdb scripts will run automatically)..."
      - docker compose up --build -d
      - echo ">> Done. Re-import data with: task import -- CITY=<country> -- VERSION=<v1|v2>"
    silent: false
  