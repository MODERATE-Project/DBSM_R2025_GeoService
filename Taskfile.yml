version: '3'

dotenv: ['.env']

tasks:
  up:
    desc: "Start all services"
    cmds:
      - docker compose up --build -d
    silent: true
  down:
    desc: "Stop all services"
    cmds:
      - docker compose down
    silent: true
  logs:
    desc: "Show logs for all services"
    cmds:
      - docker compose logs -f
    silent: true
  ps:
    desc: "Show status of all services"
    cmds:
      - docker compose ps
    silent: true
  import:
    desc: "📦 Import GPKG data into PostGIS | 🧰 Usage: task import -- CITY=malta | 🌍 CITY options: austria, belgium, bulgaria, croatia, cyprus, czechia, denmark, estonia, finland, france, germany, greece, hungary, ireland, italy, latvia, lithuania, luxembourg, malta, netherlands, poland, portugal, romania, slovakia, slovenia, spain, sweden"

    cmds:
      - ./import_data.sh {{.CITY}}
    vars:
      CITY: '{{.CITY| default "malta"}}'